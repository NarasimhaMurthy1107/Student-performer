<!DOCTYPE html>
<html>
<head>
<title>AI Student Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background: rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
backdrop-filter: blur(20px);
box-shadow:0 0 40px rgba(0,0,0,0.4);
width:350px;
text-align:center;
color:white;
animation:fade 1s ease;
}

@keyframes fade{
from{transform:translateY(40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:8px;
outline:none;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f260,#0575e6);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px cyan;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:600;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="card">

<h1>🎓 AI Score Predictor</h1>

<form method="POST">

<input name="attendance" placeholder="Attendance %" required>
<input name="study" placeholder="Study Hours" required>
<input name="assign" placeholder="Assignments Score" required>
<input name="internal" placeholder="Internal Marks" required>
<input name="sleep" placeholder="Sleep Hours" required>
<input name="social" placeholder="Social Media Hours" required>

<button type="submit">Predict 🚀</button>

</form>

{% if prediction %}
<div class="result">
Predicted Score: {{prediction}}
</div>
{% endif %}

</div>

</body>
</html>
